# Script: ceph-qe-scripts/rgw/v2/tests/aws/test_lua_script_prerequest.py
# Versioned objects: yes. Optional: test_multipart for multipart upload.
config:
  user_count: 1
  bucket_count: 1
  objects_count: 2
  local_file_delete: true
  objects_size_range:
    min: 5K
